services:
  - type: web
    name: light-calorie-proxy
    env: node
    plan: free
    healthCheckPath: /api/health
    rootDir: proxy_server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DIFY_BASE_URL
        sync: false
      - key: DIFY_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://ahe973993-blip.github.io
      - key: MAX_FILE_MB
        value: 12
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_EXPIRES_IN
        value: 30d
      - key: DB_PATH
        value: ./data/store.json
      - key: PASSWORD_MIN_LEN
        value: 6
      - key: PASSWORD_MAX_LEN
        value: 72
      - key: PASSWORD_PBKDF2_ITERATIONS
        value: 120000
