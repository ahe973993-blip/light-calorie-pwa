services:
  - type: web
    name: light-calorie-proxy
    env: node
    plan: free
    rootDir: proxy_server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DIFY_BASE_URL
        value: https://api.dify.ai/v1
      - key: DIFY_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MAX_FILE_MB
        value: 12
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_EXPIRES_IN
        value: 30d
      - key: DB_PATH
        value: ./data/store.json
      - key: FRONTEND_ORIGIN
        value: https://ahe973993-blip.github.io/light-calorie-pwa/
      - key: SMS_PROVIDER
        value: mock
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_APP_SECRET
        sync: false
      - key: WECHAT_CALLBACK_URL
        sync: false
