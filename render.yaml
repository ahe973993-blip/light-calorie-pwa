services:
  - type: web
    name: light-calorie-proxy
    env: node
    plan: free
    rootDir: proxy_server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DIFY_BASE_URL
        value: https://api.dify.ai/v1
      - key: DIFY_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MAX_FILE_MB
        value: 12
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_EXPIRES_IN
        value: 30d
      - key: DB_PATH
        value: ./data/store.json
      - key: SMS_PROVIDER
        value: mock
      - key: SMS_CODE_TTL_SEC
        value: 300
      - key: SMS_COOLDOWN_SEC
        value: 60
      - key: SMS_DAILY_LIMIT
        value: 15
      - key: SMS_DEBUG_RETURN_CODE
        value: false
      - key: TENCENT_SMS_SECRET_ID
        sync: false
      - key: TENCENT_SMS_SECRET_KEY
        sync: false
      - key: TENCENT_SMS_APP_ID
        sync: false
      - key: TENCENT_SMS_SIGN_NAME
        sync: false
      - key: TENCENT_SMS_TEMPLATE_ID
        sync: false
      - key: TENCENT_SMS_REGION
        value: ap-guangzhou
      - key: TENCENT_SMS_TEMPLATE_PARAM_MODE
        value: code_only
